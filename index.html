const parseNumber = (v) => {
  if (v === null || v === undefined || v === '') return 0;
  if (typeof v === 'number') return v;
  let s = String(v).trim();
  if (!s) return 0;
  s = s.replace(/[₫\sVNDđ%]/gi, '');
  if (s.includes('.') && s.includes(',')) { s = s.replace(/\./g, '').replace(',', '.'); }
  else if (s.includes('.') && !s.includes(',')) {
    const parts = s.split('.');
    if (parts.length > 2 || (parts.length === 2 && parts[1].length === 3)) s = s.replace(/\./g, '');
  } else if (s.includes(',')) s = s.replace(',', '.');
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
};
const parseDate = (v) => {
  if (!v) return null;
  if (v instanceof Date) return v;
  const s = String(v).trim();
  const m1 = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (m1) { let [,d,m,y]=m1; if(y.length===2)y='20'+y; return new Date(parseInt(y),parseInt(m)-1,parseInt(d)); }
  const m2 = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (m2) return new Date(parseInt(m2[1]),parseInt(m2[2])-1,parseInt(m2[3]));
  const d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
};

  if (Math.abs(n) >= 1e3) return (n/1e3).toFixed(0)+'k';
  return formatNumber(n);
};

const ENCRYPTED_CSV = 'aIlZQ+yO70+7FOxXeV963Eh7HW2j0nY/QluVhQ6RINJH7fhi8Oagl3UE+o3qRkaxKadbPT1k4FXPFeajrxJzWftNUBiwWixyIBm0Kb32lanHhisxQfjDB9r2I3FQSxashrClx59PC3P1QTfLZEb/b31rXVkPUTo/9ncJ1/xDZJjKThRaF2eMK0utovjPHeBqWAAVcIfMRLo5NAuNayOfd+jJbTty8le+ZdvL6+usCNp0XunV3bf2jHZK9y4=';

async function decryptCsvUrl(password) {
  try {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.digest('SHA-256', enc.encode(password));
    const key = await crypto.subtle.importKey('raw', keyMaterial, { name: 'AES-GCM' }, false, ['decrypt']);
    const data = Uint8Array.from(atob(ENCRYPTED_CSV), c => c.charCodeAt(0));
    const iv = data.slice(0, 12);
    const authTag = data.slice(12, 28);
    const ciphertext = data.slice(28);
    const combined = new Uint8Array(ciphertext.length + authTag.length);
    combined.set(ciphertext); combined.set(authTag, ciphertext.length);
    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, combined);
    return new TextDecoder().decode(decrypted);
  } catch (e) {
    return null;
  }
}

const getDefaultCsvUrl = () => {
  const params = new URLSearchParams(window.location.search);
  const fromQuery = params.get('csv');
  if (fromQuery) return decodeURIComponent(fromQuery);
  const fromHash = window.location.hash.replace(/^#/, '');
  if (fromHash.startsWith('http')) return decodeURIComponent(fromHash);
  return '';
};

    });

const findKey = (row, candidates) => {
  const keys = Object.keys(row);
  for (const c of candidates) {
    const target = c.toLowerCase().replace(/\s+/g,' ').trim();
    const k = keys.find(k => k.toLowerCase().replace(/\s+/g,' ').trim() === target);
    if (k) return k;
  }
  for (const c of candidates) {
    const target = c.toLowerCase().replace(/\s+/g,' ').trim();
    const k = keys.find(k => k.toLowerCase().replace(/\s+/g,' ').trim().includes(target));
    if (k) return k;
  }
  return null;
};

const normalizeRow = (row) => {
  const k = (cands) => findKey(row, cands);
  return {
    date: parseDate(row[k(['NGÀY','NGAY','Date'])]),
    branch: (row[k(['TÊN CHI NHÁNH','CHI NHÁNH','Branch'])]||'').toString().trim(),
    region: (row[k(['Vùng','Vung','Region'])]||'N/A').toString().trim(),
    storeType: (row[k(['Loại cửa hàng','Loai cua hang','Store type'])]||'N/A').toString().trim(),

    crvA: parseNumber(row[k(['CRV đạt','CR đạt','CRV dat'])]),
  };
};


const PASSWORD_HASH = '5d517d6dbf85194e3fec26e131260a3e920b550dccb5f395d44601ddbce85d83';
const SESSION_KEY = 'gumac_dash_auth';
const SESSION_HOURS = 8;

async function sha256(text) {
  const buf = new TextEncoder().encode(text);
  const hashBuf = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function LoginGate({ onSuccess }) {
  const [pwd, setPwd] = useState('');
  const [showPwd, setShowPwd] = useState(false);
  const [err, setErr] = useState('');
  const [shake, setShake] = useState(false);
  const [checking, setChecking] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current && inputRef.current.focus(); }, []);

  const submit = async (e) => {
    if (e) e.preventDefault();
    const trimmed = pwd.trim();
    if (!trimmed) {
      setErr('Vui lòng nhập mật khẩu.');
      setShake(true);
      setTimeout(() => setShake(false), 500);
      return;
    }
    setChecking(true);
    try {
      const inputHash = await sha256(trimmed);
      if (inputHash === PASSWORD_HASH) {
        const decryptedUrl = await decryptCsvUrl(trimmed);
        if (!decryptedUrl) {
          setErr('Lỗi giải mã dữ liệu nguồn.');
          setChecking(false);
          return;
        }
        try {
          const expiry = Date.now() + SESSION_HOURS * 3600 * 1000;
          sessionStorage.setItem(SESSION_KEY, JSON.stringify({ ok: true, expiry, k: trimmed }));
        } catch {}
        onSuccess(decryptedUrl);
        return;
      }
      setErr('Mật khẩu không đúng.');
      setShake(true);
      setTimeout(() => setShake(false), 500);
      inputRef.current && inputRef.current.focus();
      inputRef.current && inputRef.current.select();
    } catch (e) {
      setErr('Lỗi xác thực: ' + e.message);
    } finally {
      setChecking(false);
    }
  };

  return (
    <div className="login-bg min-h-screen flex items-center justify-center p-6">
      <div className={`w-full max-w-md ${shake ? 'shake' : ''}`}>
        <div className="surface-elevated p-8 fadeup glass">
          <div className="flex flex-col items-center mb-8">
            <div className="w-16 h-16 rounded-2xl flex items-center justify-center mb-4" style={{background:'linear-gradient(135deg, #c7dafc 0%, #d9c8f7 50%, #f7c8dc 100%)', boxShadow:'0 8px 24px rgba(184,156,240,0.3)'}}>
              <IconLock size={28} className="text-white" stroke={2.5}/>
            </div>
            <h1 className="display-font text-2xl font-bold mb-1.5 shimmer-text">GUMAC Dashboard</h1>
            <p className="text-sm text-slate-500 text-center">Vui lòng nhập mật khẩu để truy cập</p>
          </div>

          <form onSubmit={submit} className="space-y-4">
            <div>
              <label className="block text-xs font-semibold text-slate-600 mb-2 uppercase tracking-wider">Mật khẩu</label>
              <div className="relative">
                <input
                  ref={inputRef}
                  type={showPwd ? 'text' : 'password'}
                  value={pwd}
                  onChange={(e) => { setPwd(e.target.value); setErr(''); }}
                  className="input-soft pr-14 text-base"
                  placeholder="Nhập mật khẩu..."
                  autoComplete="current-password"
                />
                <button
                  type="button"
                  onClick={() => setShowPwd(!showPwd)}
                  title={showPwd ? 'Ẩn mật khẩu' : 'Hiện mật khẩu'}
                  className="absolute right-2 top-1/2 -translate-y-1/2 w-9 h-9 rounded-lg flex items-center justify-center text-slate-400 hover:text-blue-500 hover:bg-blue-50 transition"
                  style={{background:'transparent', border:'none', cursor:'pointer'}}
                >
                  {showPwd ? <IconEyeOff size={18}/> : <IconEye size={18}/>}
                </button>
              </div>
              {err && (
                <div className="mt-2 flex items-center gap-1.5 text-xs text-rose-500">
                  <IconAlert size={13}/> {err}
                </div>
              )}
            </div>

            <button type="submit" disabled={checking} className="btn-primary w-full flex items-center justify-center gap-2 disabled:opacity-60">
              {checking ? <><IconRefresh size={16} className="animate-spin"/> Đang xác thực...</> : <><IconSparkles size={16}/> Truy cập Dashboard</>}
            </button>
          </form>

          <div className="mt-8 pt-6 border-t border-slate-100 text-center">
            <p className="text-[11px] text-slate-400">Phiên đăng nhập tồn tại trong {SESSION_HOURS} giờ</p>
          </div>
        </div>
      </div>
    </div>
  );
}


function App() {
  const [authed, setAuthed] = useState(false);
  const [csvFromLogin, setCsvFromLogin] = useState('');
  const [restoring, setRestoring] = useState(true);

  // Restore session: nếu còn hạn thì cần decrypt URL lại bằng password lưu trong session
  useEffect(() => {
    (async () => {
      try {
        const s = sessionStorage.getItem(SESSION_KEY);
        if (!s) { setRestoring(false); return; }
        const { ok, expiry, k } = JSON.parse(s);
        if (!ok || expiry <= Date.now() || !k) {
          sessionStorage.removeItem(SESSION_KEY);
          setRestoring(false);
          return;
        }
        const url = await decryptCsvUrl(k);
        if (url) {
          setCsvFromLogin(url);
          setAuthed(true);
        } else {
          sessionStorage.removeItem(SESSION_KEY);
        }
      } catch {
        sessionStorage.removeItem(SESSION_KEY);
      } finally {
        setRestoring(false);
      }
    })();
  }, []);

  if (restoring) return <div className="min-h-screen flex items-center justify-center"><div className="text-slate-400 text-sm">Đang khởi tạo...</div></div>;

  if (!authed) return <LoginGate onSuccess={(url) => { setCsvFromLogin(url); setAuthed(true); }} />;
  return <DashboardMain initialCsvUrl={csvFromLogin} onLogout={() => { sessionStorage.removeItem(SESSION_KEY); setCsvFromLogin(''); setAuthed(false); }} />;
}

function DashboardMain({ initialCsvUrl, onLogout }) {
  const [rawData, setRawData] = useState([]);
  const [csvUrl, setCsvUrl] = useState(initialCsvUrl || getDefaultCsvUrl());
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [usingSample, setUsingSample] = useState(true);
  const [filterRegion, setFilterRegion] = useState('all');
  const [filterStoreType, setFilterStoreType] = useState('all');
  const [filterBranch, setFilterBranch] = useState('all');

  const [dateTo, setDateTo] = useState('');
  const [dateRangePreset, setDateRangePreset] = useState('this_month');
  const [dailyTablePage, setDailyTablePage] = useState(0);
  const [chartMetric, setChartMetric] = useState('dthu'); // dthu, don, sp, traffic, atv, upt, crv

  useEffect(() => {
    const sample = generateSampleData().map(normalizeRow);
    setRawData(sample);
    if (csvUrl) setTimeout(() => loadFromCsv(csvUrl), 500);
  }, []);

  const loadFromCsv = async (urlOverride) => {
    const useUrl = urlOverride || csvUrl;
    if (!useUrl.trim()) { setError('Vui lòng nhập link CSV'); return; }
    setLoading(true); setError('');
    const attempts = [
      { name:'direct', url:useUrl },
      { name:'corsproxy.io', url:`https://corsproxy.io/?${encodeURIComponent(useUrl)}` },
      { name:'allorigins', url:`https://api.allorigins.win/raw?url=${encodeURIComponent(useUrl)}` },
      { name:'codetabs', url:`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(useUrl)}` },
    ];
    let lastErr = null;
    for (const a of attempts) {
      try {
        const res = await fetch(a.url, { redirect:'follow' });
        if (!res.ok) { lastErr = new Error(`HTTP ${res.status}`); continue; }
        const text = await res.text();
        if (!text || text.length < 10) { lastErr = new Error('Phản hồi rỗng'); continue; }
        if (text.trim().toLowerCase().startsWith('<!doctype') || text.trim().toLowerCase().startsWith('<html')) {
          lastErr = new Error('Nhận về HTML thay vì CSV. Sheet có thể chưa publish.'); continue;
        }
        const parsed = Papa.parse(text, { header:true, skipEmptyLines:true });
        const normalized = parsed.data.map(normalizeRow).filter(r => r.date && r.branch);
        if (normalized.length === 0) { lastErr = new Error('Không nhận diện được cột'); continue; }
        setRawData(normalized); setUsingSample(false);
        setError(`✓ Đã tải ${normalized.length} dòng qua ${a.name}`);
        setLoading(false); return;
      } catch (e) { lastErr = e; }
    }
    setError(`Không kết nối được. Lỗi: ${lastErr ? lastErr.message : 'unknown'}. Thử Upload CSV.`);
    setLoading(false);
  };

  const handleFileUpload = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setLoading(true);
    Papa.parse(file, {
      header:true, skipEmptyLines:true,
      complete: (res) => {
        const normalized = res.data.map(normalizeRow).filter(r => r.date && r.branch);
        if (normalized.length === 0) setError('File không có dữ liệu hợp lệ');
        else { setRawData(normalized); setUsingSample(false); setError(`✓ Đã tải ${normalized.length} dòng từ file`); }
        setLoading(false);
      },
      error: (err) => { setError('Lỗi đọc file: ' + err.message); setLoading(false); }
    });
  };

  const toInputDate = (d) => d ? `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}` : '';

  useEffect(() => {
    if (rawData.length === 0) return;
    const dates = rawData.map(r => r.date.getTime());
    const maxD = new Date(Math.max(...dates));
    const minD = new Date(Math.min(...dates));
    if (dateRangePreset === 'custom') return;
    let from, to;
    if (dateRangePreset === 'this_month') { from = new Date(maxD.getFullYear(), maxD.getMonth(), 1); to = maxD; }
    else if (dateRangePreset === 'last_7') { to = maxD; from = new Date(maxD); from.setDate(maxD.getDate()-6); }
    else if (dateRangePreset === 'last_30') { to = maxD; from = new Date(maxD); from.setDate(maxD.getDate()-29); }
    else if (dateRangePreset === 'last_month') { from = new Date(maxD.getFullYear(), maxD.getMonth()-1, 1); to = new Date(maxD.getFullYear(), maxD.getMonth(), 0); }
    else if (dateRangePreset === 'all') { from = minD; to = maxD; }
    setDateFrom(toInputDate(from)); setDateTo(toInputDate(to));
  }, [rawData, dateRangePreset]);

  const { currentData, prevData, dateRange, prevRange } = useMemo(() => {
    if (rawData.length === 0 || !dateFrom || !dateTo) return { currentData:[], prevData:[], dateRange:null, prevRange:null };
    const curStart = new Date(dateFrom + 'T00:00:00');
    const curEnd = new Date(dateTo + 'T23:59:59');
    if (isNaN(curStart) || isNaN(curEnd)) return { currentData:[], prevData:[], dateRange:null, prevRange:null };
    const prevStart = new Date(curStart); prevStart.setMonth(prevStart.getMonth()-1);
    const prevEnd = new Date(curEnd); prevEnd.setMonth(prevEnd.getMonth()-1);
    const cur = rawData.filter(r => r.date >= curStart && r.date <= curEnd);
    const prev = rawData.filter(r => r.date >= prevStart && r.date <= prevEnd);
    return { currentData:cur, prevData:prev, dateRange:[curStart,curEnd], prevRange:[prevStart,prevEnd] };
  }, [rawData, dateFrom, dateTo]);

  const regions = useMemo(() => [...new Set(rawData.map(r => r.region))].filter(Boolean).sort(), [rawData]);
  const storeTypes = useMemo(() => [...new Set(rawData.map(r => r.storeType))].filter(Boolean).sort(), [rawData]);
  const branches = useMemo(() => {
    let list = rawData;
    if (filterRegion !== 'all') list = list.filter(r => r.region === filterRegion);
    if (filterStoreType !== 'all') list = list.filter(r => r.storeType === filterStoreType);
    return [...new Set(list.map(r => r.branch))].filter(Boolean).sort();
  }, [rawData, filterRegion, filterStoreType]);

  const applyFilters = (data) => data.filter(r => {
    if (filterRegion !== 'all' && r.region !== filterRegion) return false;
    if (filterStoreType !== 'all' && r.storeType !== filterStoreType) return false;
    if (filterBranch !== 'all' && r.branch !== filterBranch) return false;
    return true;
  });

  const filtered = useMemo(() => applyFilters(currentData), [currentData, filterRegion, filterStoreType, filterBranch]);
  const filteredPrev = useMemo(() => applyFilters(prevData), [prevData, filterRegion, filterStoreType, filterBranch]);

  const aggregate = (data) => {
    const a = { dthuT:0, donT:0, spT:0, trafficT:0, dthuA:0, donA:0, spA:0, trafficA:0, count:data.length };
    data.forEach(r => {
      a.dthuT += r.dthuT; a.donT += r.donT; a.spT += r.spT; a.trafficT += r.trafficT;
      a.dthuA += r.dthuA; a.donA += r.donA; a.spA += r.spA; a.trafficA += r.trafficA;
    });
    a.atvT = a.donT ? a.dthuT/a.donT : 0; a.uptT = a.donT ? a.spT/a.donT : 0; a.crvT = a.trafficT ? (a.donT/a.trafficT)*100 : 0;
    a.atvA = a.donA ? a.dthuA/a.donA : 0; a.uptA = a.donA ? a.spA/a.donA : 0; a.crvA = a.trafficA ? (a.donA/a.trafficA)*100 : 0;
    return a;
  };

  const cur = useMemo(() => aggregate(filtered), [filtered]);
  const prev = useMemo(() => aggregate(filteredPrev), [filteredPrev]);

  const compareTable = useMemo(() => {
    const fmt = (k,v) => { if(k==='dthu'||k==='atv') return formatCurrency(v); if(k==='crv') return formatNumber(v,2)+'%'; if(k==='upt') return formatNumber(v,2); return formatNumber(v); };
    const metrics = [
      { k:'dthu', label:'Doanh thu', a:cur.dthuA, t:cur.dthuT, pa:prev.dthuA },
      { k:'don', label:'Đơn hàng', a:cur.donA, t:cur.donT, pa:prev.donA },
      { k:'sp', label:'Sản phẩm', a:cur.spA, t:cur.spT, pa:prev.spA },
      { k:'traffic', label:'Traffic', a:cur.trafficA, t:cur.trafficT, pa:prev.trafficA },
      { k:'atv', label:'ATV', a:cur.atvA, t:cur.atvT, pa:prev.atvA },
      { k:'upt', label:'UPT', a:cur.uptA, t:cur.uptT, pa:prev.uptA },
      { k:'crv', label:'CRV (%)', a:cur.crvA, t:cur.crvT, pa:prev.crvA },
    ];
    return metrics.map(m => ({ ...m, actDisplay:fmt(m.k,m.a), tgtDisplay:fmt(m.k,m.t), prevDisplay:fmt(m.k,m.pa),
      vsTarget:pctChange(m.a,m.t), vsPrev:pctChange(m.a,m.pa), pctOfTarget:m.t?(m.a/m.t)*100:null }));
  }, [cur, prev]);

  // Daily aggregate cho biểu đồ và bảng chi tiết
  const dailyAggregate = useMemo(() => {
    // Aggregate kỳ hiện tại
    const map = new Map();
    filtered.forEach(r => {
      const key = r.date.toISOString().slice(0,10);
      if (!map.has(key)) map.set(key, { date:r.date, dthuA:0, donA:0, spA:0, trafficA:0, dthuT:0, donT:0, spT:0, trafficT:0, count:0 });
      const e = map.get(key);
      e.dthuA += r.dthuA; e.donA += r.donA; e.spA += r.spA; e.trafficA += r.trafficA;
      e.dthuT += r.dthuT; e.donT += r.donT; e.spT += r.spT; e.trafficT += r.trafficT;
      e.count += 1;
    });

    // Aggregate cùng kỳ tháng trước theo từng ngày
    const prevMap = new Map();
    filteredPrev.forEach(r => {
      const key = r.date.toISOString().slice(0,10);
      if (!prevMap.has(key)) prevMap.set(key, { dthuA:0, donA:0, spA:0, trafficA:0 });
      const e = prevMap.get(key);
      e.dthuA += r.dthuA; e.donA += r.donA; e.spA += r.spA; e.trafficA += r.trafficA;
    });

    return [...map.values()].sort((a,b) => b.date - a.date).map(e => {
      const atvA = e.donA ? e.dthuA/e.donA : 0;
      const atvT = e.donT ? e.dthuT/e.donT : 0;
      const uptA = e.donA ? e.spA/e.donA : 0;
      const uptT = e.donT ? e.spT/e.donT : 0;
      const crvA = e.trafficA ? (e.donA/e.trafficA)*100 : 0;
      const crvT = e.trafficT ? (e.donT/e.trafficT)*100 : 0;

      // Tìm cùng kỳ: cùng ngày trong tháng, lùi 1 tháng
      const prevDate = new Date(e.date);
      prevDate.setMonth(prevDate.getMonth() - 1);
      const prevKey = prevDate.toISOString().slice(0,10);
      const prev = prevMap.get(prevKey) || { dthuA:0, donA:0, spA:0, trafficA:0 };
      const prevAtvA = prev.donA ? prev.dthuA/prev.donA : 0;
      const prevUptA = prev.donA ? prev.spA/prev.donA : 0;
      const prevCrvA = prev.trafficA ? (prev.donA/prev.trafficA)*100 : 0;

      return {
        ...e, atvA, atvT, uptA, uptT, crvA, crvT,
        // Cùng kỳ
        prev_dthuA: prev.dthuA, prev_donA: prev.donA, prev_spA: prev.spA, prev_trafficA: prev.trafficA,
        prev_atvA: prevAtvA, prev_uptA: prevUptA, prev_crvA: prevCrvA,
        // Tỷ lệ đạt (% MT)
        pct_dthu: e.dthuT ? (e.dthuA/e.dthuT)*100 : null,
        pct_don: e.donT ? (e.donA/e.donT)*100 : null,
        pct_sp: e.spT ? (e.spA/e.spT)*100 : null,
        pct_traffic: e.trafficT ? (e.trafficA/e.trafficT)*100 : null,
        pct_atv: atvT ? (atvA/atvT)*100 : null,
        pct_upt: uptT ? (uptA/uptT)*100 : null,
        pct_crv: crvT ? (crvA/crvT)*100 : null,
        // So với cùng kỳ (% chênh lệch)
        ck_dthu: pctChange(e.dthuA, prev.dthuA),
        ck_don: pctChange(e.donA, prev.donA),
        ck_sp: pctChange(e.spA, prev.spA),
        ck_traffic: pctChange(e.trafficA, prev.trafficA),
        ck_atv: pctChange(atvA, prevAtvA),
        ck_upt: pctChange(uptA, prevUptA),
        ck_crv: pctChange(crvA, prevCrvA),
      };
    });
  }, [filtered, filteredPrev]);

  const dailySeries = useMemo(() => [...dailyAggregate].reverse().map(e => ({ ...e, label: formatDateKey(e.date) })), [dailyAggregate]);

  const branchClassification = useMemo(() => {
    const byBranch = new Map();
    filtered.forEach(r => {
      if (!byBranch.has(r.branch)) byBranch.set(r.branch, { branch:r.branch, region:r.region, storeType:r.storeType, dthuA:0, donA:0, spA:0, trafficA:0, dthuT:0, donT:0, spT:0, trafficT:0, days:0 });
      const e = byBranch.get(r.branch);
      e.dthuA += r.dthuA; e.donA += r.donA; e.spA += r.spA; e.trafficA += r.trafficA;
      e.dthuT += r.dthuT; e.donT += r.donT; e.spT += r.spT; e.trafficT += r.trafficT; e.days += 1;
    });
    return [...byBranch.values()].map(e => {
      const trafficRatio = e.trafficT ? e.trafficA/e.trafficT : 0;
      const crvA = e.trafficA ? (e.donA/e.trafficA)*100 : 0;
      const crvT = e.trafficT ? (e.donT/e.trafficT)*100 : 0;
      const crvRatio = crvT ? crvA/crvT : 0;
      const atvA = e.donA ? e.dthuA/e.donA : 0;
      const atvT = e.donT ? e.dthuT/e.donT : 0;
      const atvRatio = atvT ? atvA/atvT : 0;
      const tDat = trafficRatio >= 1, cDat = crvRatio >= 1, aDat = atvRatio >= 1;
      return { ...e, trafficRatio, crvRatio, atvRatio, crvA, crvT, atvA, atvT, tDat, cDat, aDat, group:getStoreGroup(tDat,cDat,aDat) };
    }).sort((a,b) => a.group.localeCompare(b.group) || a.branch.localeCompare(b.branch));
  }, [filtered]);

  const groupSummary = useMemo(() => {
    const out = {}; Object.keys(GROUP_INFO).forEach(g => out[g] = []);
    branchClassification.forEach(b => { if (out[b.group]) out[b.group].push(b); });
    return out;
  }, [branchClassification]);

  const branchRanking = useMemo(() => [...branchClassification].sort((a,b) => b.dthuA - a.dthuA), [branchClassification]);

  const exportCsv = () => {
    if (filtered.length === 0) return;
    const rows = filtered.map(r => ({ 'Ngày':formatDateFull(r.date),'Chi nhánh':r.branch,'Vùng':r.region,'Loại CH':r.storeType,
      'DTHU đạt':r.dthuA,'DTHU MT':r.dthuT,'Đơn đạt':r.donA,'Đơn MT':r.donT,'Traffic đạt':r.trafficA,'Traffic MT':r.trafficT,'ATV đạt':r.atvA,'CRV đạt':r.crvA }));
    const csv = Papa.unparse(rows);
    const blob = new Blob(["\uFEFF"+csv], { type:'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'gumac-dashboard-export.csv'; a.click();
  };

  const shareLink = () => {
    if (!csvUrl) { alert('Hãy nhập và tải dữ liệu CSV trước'); return; }
    const url = `${window.location.origin}${window.location.pathname}?csv=${encodeURIComponent(csvUrl)}`;
    navigator.clipboard.writeText(url).then(() => alert('Đã copy link chia sẻ! (Người nhận vẫn cần mật khẩu để xem)'));
  };

  const PAGE_SIZE = 15;
  const totalDailyPages = Math.ceil(dailyAggregate.length / PAGE_SIZE);
  const dailyPageData = dailyAggregate.slice(dailyTablePage*PAGE_SIZE, (dailyTablePage+1)*PAGE_SIZE);

  return (

            </div>
            <div>
              <h1 className="display-font text-2xl font-bold tracking-tight">GUMAC Dashboard</h1>
              <p className="text-xs text-slate-500 mt-0.5">
                {dateRange ? <>Kỳ phân tích <span className="font-semibold text-slate-700">{formatDateKey(dateRange[0])} → {formatDateKey(dateRange[1])}</span>{prevRange && <span className="text-slate-400"> • Cùng kỳ {formatDateKey(prevRange[0])} → {formatDateKey(prevRange[1])}</span>}</> : 'Đang tải...'}

            </div>

          <KpiCard label="Traffic" value={formatNumber(cur.trafficA)} target={formatNumber(cur.trafficT)} vsTarget={pctChange(cur.trafficA,cur.trafficT)} vsPrev={pctChange(cur.trafficA,prev.trafficA)} accent="#d9c8f7" iconBg="#f4eeff" delay={50}/>
          <KpiCard label="ATV" value={formatCurrency(cur.atvA)} target={formatCurrency(cur.atvT)} vsTarget={pctChange(cur.atvA,cur.atvT)} vsPrev={pctChange(cur.atvA,prev.atvA)} accent="#f7c8dc" iconBg="#fdeef4" delay={100}/>
          <KpiCard label="CRV" value={formatNumber(cur.crvA,2)+'%'} target={formatNumber(cur.crvT,2)+'%'} vsTarget={pctChange(cur.crvA,cur.crvT)} vsPrev={pctChange(cur.crvA,prev.crvA)} accent="#b9e6c9" iconBg="#ecf7f0" delay={150}/>
        </section>

        <section className="surface-elevated p-7 fadeup" style={{animationDelay:'150ms'}}>
          <div className="mb-5 flex items-center gap-2">

              <div>
                <h2 className="display-font text-lg font-bold text-slate-800">Chi tiết tất cả chỉ số theo ngày</h2>
                <p className="text-xs text-slate-500 mt-0.5">Tổng hợp tất cả chi nhánh đã lọc • Mới nhất → cũ nhất</p>

          <div className="overflow-x-auto -mx-3">
            <table className="w-full text-xs">

                <tr className="text-[10px] uppercase tracking-wider text-slate-400 font-semibold">

                  <th colSpan="3" className="text-center py-3 px-2 border-l border-slate-100" style={{color:'#5b8def'}}>Doanh thu</th>
                  <th colSpan="3" className="text-center py-3 px-2 border-l border-slate-100" style={{color:'#ed9ebe'}}>Đơn hàng</th>
                  <th colSpan="3" className="text-center py-3 px-2 border-l border-slate-100" style={{color:'#b89cf0'}}>Sản phẩm</th>
                  <th colSpan="3" className="text-center py-3 px-2 border-l border-slate-100" style={{color:'#d4a849'}}>Traffic</th>
                  <th colSpan="3" className="text-center py-3 px-2 border-l border-slate-100" style={{color:'#6dc88a'}}>ATV</th>
                  <th colSpan="3" className="text-center py-3 px-2 border-l border-slate-100" style={{color:'#5b8def'}}>UPT</th>
                  <th colSpan="3" className="text-center py-3 px-2 border-l border-slate-100" style={{color:'#e57878'}}>CRV (%)</th>
                </tr>
                <tr className="text-[10px] text-slate-400 font-medium border-b border-slate-200">
                  <th className="text-right py-2 px-2 border-l border-slate-100">Đạt</th><th className="text-right py-2 px-2">MT</th><th className="text-right py-2 px-2">%MT</th>
                  <th className="text-right py-2 px-2 border-l border-slate-100">Đạt</th><th className="text-right py-2 px-2">MT</th><th className="text-right py-2 px-2">%MT</th>
                  <th className="text-right py-2 px-2 border-l border-slate-100">Đạt</th><th className="text-right py-2 px-2">MT</th><th className="text-right py-2 px-2">%MT</th>
                  <th className="text-right py-2 px-2 border-l border-slate-100">Đạt</th><th className="text-right py-2 px-2">MT</th><th className="text-right py-2 px-2">%MT</th>
                  <th className="text-right py-2 px-2 border-l border-slate-100">Đạt</th><th className="text-right py-2 px-2">MT</th><th className="text-right py-2 px-2">%MT</th>
                  <th className="text-right py-2 px-2 border-l border-slate-100">Đạt</th><th className="text-right py-2 px-2">MT</th><th className="text-right py-2 px-2">%MT</th>
                  <th className="text-right py-2 px-2 border-l border-slate-100">Đạt</th><th className="text-right py-2 px-2">MT</th><th className="text-right py-2 px-2">%MT</th>
                </tr>
              </thead>
              <tbody>
                {dailyPageData.map((d) => (
                  <tr key={d.date.toISOString()} className="border-b border-slate-50 hover:bg-slate-50/40 transition">
                    <td className="py-2.5 px-3 font-semibold text-slate-700 sticky left-0 bg-white whitespace-nowrap">{formatDateFull(d.date)}</td>
                    {/* DOANH THU */}
                    <td className="py-2.5 px-2 text-right ticker border-l border-slate-100 font-medium text-slate-800">{formatCurrency(d.dthuA)}</td>
                    <td className="py-2.5 px-2 text-right ticker text-slate-400">{formatCurrency(d.dthuT)}</td>
                    <td className="py-2.5 px-2 text-right ticker"><PctCell v={d.pct_dthu}/></td>
                    {/* ĐƠN HÀNG */}
                    <td className="py-2.5 px-2 text-right ticker border-l border-slate-100 font-medium text-slate-800">{formatNumber(d.donA)}</td>
                    <td className="py-2.5 px-2 text-right ticker text-slate-400">{formatNumber(d.donT)}</td>
                    <td className="py-2.5 px-2 text-right ticker"><PctCell v={d.pct_don}/></td>
                    {/* SẢN PHẨM */}
                    <td className="py-2.5 px-2 text-right ticker border-l border-slate-100 font-medium text-slate-800">{formatNumber(d.spA)}</td>
                    <td className="py-2.5 px-2 text-right ticker text-slate-400">{formatNumber(d.spT)}</td>
                    <td className="py-2.5 px-2 text-right ticker"><PctCell v={d.pct_sp}/></td>
                    {/* TRAFFIC */}
                    <td className="py-2.5 px-2 text-right ticker border-l border-slate-100 font-medium text-slate-800">{formatNumber(d.trafficA)}</td>
                    <td className="py-2.5 px-2 text-right ticker text-slate-400">{formatNumber(d.trafficT)}</td>
                    <td className="py-2.5 px-2 text-right ticker"><PctCell v={d.pct_traffic}/></td>
                    {/* ATV */}
                    <td className="py-2.5 px-2 text-right ticker border-l border-slate-100 font-medium text-slate-800">{formatCurrency(d.atvA)}</td>
                    <td className="py-2.5 px-2 text-right ticker text-slate-400">{formatCurrency(d.atvT)}</td>
                    <td className="py-2.5 px-2 text-right ticker"><PctCell v={d.pct_atv}/></td>
                    {/* UPT */}
                    <td className="py-2.5 px-2 text-right ticker border-l border-slate-100 font-medium text-slate-800">{formatNumber(d.uptA,2)}</td>
                    <td className="py-2.5 px-2 text-right ticker text-slate-400">{formatNumber(d.uptT,2)}</td>
                    <td className="py-2.5 px-2 text-right ticker"><PctCell v={d.pct_upt}/></td>
                    {/* CRV */}
                    <td className="py-2.5 px-2 text-right ticker border-l border-slate-100 font-medium text-slate-800">{formatNumber(d.crvA,2)}</td>
                    <td className="py-2.5 px-2 text-right ticker text-slate-400">{formatNumber(d.crvT,2)}</td>
                    <td className="py-2.5 px-2 text-right ticker"><PctCell v={d.pct_crv}/></td>
                  </tr>
                ))}
                {dailyAggregate.length === 0 && (
                  <tr><td colSpan="22" className="text-center py-12 text-slate-400">Không có dữ liệu trong khoảng ngày này</td></tr>
                )}
              </tbody>
            </table>
          </div>
        </section>

        <section className="grid grid-cols-1 lg:grid-cols-2 gap-5 fadeup" style={{animationDelay:'250ms'}}>
          <div className="surface-elevated p-7">
            <div className="flex items-center gap-2 mb-5">
              <span className="pill" style={{background:'#ecf7f0', color:'#3f9b5d'}}>TOP</span>
              <h3 className="display-font text-lg font-bold text-slate-800">5 chi nhánh dẫn đầu</h3>
            </div>
            <RankList items={branchRanking.slice(0,5)} variant="good"/>
          </div>
          <div className="surface-elevated p-7">
            <div className="flex items-center gap-2 mb-5">
              <span className="pill" style={{background:'#fdecec', color:'#c44545'}}>CẦN CẢI THIỆN</span>
              <h3 className="display-font text-lg font-bold text-slate-800">5 chi nhánh thấp nhất</h3>
            </div>
            <RankList items={branchRanking.slice(-5).reverse()} variant="warn"/>
          </div>
        </section>

        <section className="surface-elevated p-7 fadeup" style={{animationDelay:'300ms'}}>
          <div className="mb-6 flex items-center gap-2">
            <div className="w-8 h-8 rounded-xl flex items-center justify-center" style={{background:'#f4eeff'}}><IconSparkles size={15} className="text-purple-400"/></div>
            <div>
              <h2 className="display-font text-lg font-bold text-slate-800">Phân loại chi nhánh</h2>
              <p className="text-xs text-slate-500 mt-0.5">Theo Traffic × CRV × ATV — Đạt khi Thực đạt ≥ Mục tiêu (tổng cả kỳ)</p>
            </div>
          </div>
          <div className="grid grid-cols-4 lg:grid-cols-8 gap-3 mb-6">
            {Object.entries(GROUP_INFO).map(([g,info]) => (
              <div key={g} className="rounded-2xl p-4 text-center transition hover:-translate-y-0.5" style={{background:info.bg, border:`1px solid ${info.border}`}}>
                <div className="text-[10px] font-bold mb-1" style={{color:info.color}}>{g}</div>
                <div className="text-3xl font-bold ticker mb-1 display-font" style={{color:info.color}}>{groupSummary[g].length}</div>
                <div className="text-[10px] text-slate-600 leading-tight font-medium">{info.label}</div>
              </div>
            ))}
          </div>
          <div className="space-y-4">
            {Object.entries(GROUP_INFO).map(([g,info]) => {
              const stores = groupSummary[g];
              if (stores.length === 0) return null;
              return (
                <div key={g} className="rounded-2xl border overflow-hidden" style={{borderColor:info.border}}>
                  <div className="px-5 py-4 flex items-start gap-4" style={{background:info.bg}}>
                    <div className="w-12 h-12 rounded-2xl flex items-center justify-center font-bold text-white shrink-0 display-font text-base" style={{background:info.color}}>{g}</div>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="font-bold text-slate-800">{info.label}</span>
                        <span className="text-[11px] text-slate-500 font-mono">{info.cond}</span>
                        <span className="ml-auto pill" style={{background:'rgba(255,255,255,0.7)', color:info.color}}>{stores.length} chi nhánh</span>
                      </div>
                      <p className="text-sm text-slate-600 mt-2 leading-relaxed"><span className="font-semibold text-slate-700">Khuyến nghị vận hành:</span> {info.action}</p>
                      <div className="mt-3 pt-3 border-t border-white/60 space-y-2">
                        <p className="text-xs font-bold uppercase tracking-wider mb-1.5" style={{color:info.color}}>📣 Kế hoạch Marketing</p>
                        <div className="text-sm text-slate-600 leading-relaxed">
                          <span className="inline-block px-2 py-0.5 rounded-md text-[10px] font-bold mr-1.5 align-middle" style={{background:'rgba(91,141,239,0.12)', color:'#4076d6'}}>TRADE</span>
                          {info.trade}
                        </div>
                        <div className="text-sm text-slate-600 leading-relaxed">
                          <span className="inline-block px-2 py-0.5 rounded-md text-[10px] font-bold mr-1.5 align-middle" style={{background:'rgba(184,156,240,0.15)', color:'#8a6dd1'}}>DIGITAL</span>
                          {info.digital}
                        </div>
                        <div className="text-sm text-slate-600 leading-relaxed">
                          <span className="inline-block px-2 py-0.5 rounded-md text-[10px] font-bold mr-1.5 align-middle" style={{background:'rgba(237,158,190,0.18)', color:'#c45a82'}}>CONTENT</span>
                          {info.content}
                        </div>
                      </div>
                    </div>
                  </div>
                  <div className="bg-white overflow-x-auto">
                    <table className="w-full text-sm">
                      <thead><tr className="text-[10px] uppercase tracking-wider text-slate-400 font-semibold border-b border-slate-100">
                        <th className="text-left py-3 px-5">Chi nhánh</th>
                        <th className="text-left py-3 px-2">Vùng</th>
                        <th className="text-left py-3 px-2">Loại</th>
                        <th className="text-right py-3 px-2">Traffic %MT</th>
                        <th className="text-right py-3 px-2">CRV %MT</th>
                        <th className="text-right py-3 px-2">ATV %MT</th>
                        <th className="text-right py-3 px-5">DTHU</th>
                      </tr></thead>
                      <tbody>{stores.map(s => (
                        <tr key={s.branch} className="border-b border-slate-50 last:border-b-0 hover:bg-slate-50/40 transition">
                          <td className="py-3 px-5 font-semibold text-slate-800">{s.branch}</td>
                          <td className="py-3 px-2 text-slate-500 text-xs">{s.region}</td>
                          <td className="py-3 px-2 text-slate-500 text-xs">{s.storeType}</td>
                          <td className="py-3 px-2 text-right ticker text-xs font-semibold" style={{color: s.tDat?'#6dc88a':'#e57878'}}>{(s.trafficRatio*100).toFixed(0)}%</td>
                          <td className="py-3 px-2 text-right ticker text-xs font-semibold" style={{color: s.cDat?'#6dc88a':'#e57878'}}>{(s.crvRatio*100).toFixed(0)}%</td>
                          <td className="py-3 px-2 text-right ticker text-xs font-semibold" style={{color: s.aDat?'#6dc88a':'#e57878'}}>{(s.atvRatio*100).toFixed(0)}%</td>
                          <td className="py-3 px-5 text-right ticker font-bold text-slate-800">{formatCurrency(s.dthuA)}</td>
                        </tr>
                      ))}</tbody>
                    </table>
                  </div>
                </div>
              );
            })}
            {branchClassification.length === 0 && <div className="text-center py-12 text-slate-400 text-sm">Không có dữ liệu để phân loại</div>}
          </div>
        </section>

        <footer className="text-center text-xs text-slate-400 pt-4 pb-12">
          <span className="shimmer-text font-semibold">GUMAC Dashboard</span> • Phân tích thông minh • Cập nhật real-time theo nguồn dữ liệu
        </footer>
      </div>
    </div>
  );
}

function PctCell({ v }) {
  if (v == null) return <span className="text-slate-300">—</span>;
  const color = v >= 100 ? '#6dc88a' : v >= 80 ? '#d4a849' : '#e57878';
  return <span className="font-semibold" style={{color}}>{v.toFixed(0)}%</span>;
}

function MiniDelta({ v }) {
  if (v == null) return <span className="text-slate-300 text-[10px]">—</span>;
  const up = v > 0, down = v < 0;
  const color = up ? '#6dc88a' : down ? '#e57878' : '#94a3b8';
  return (
    <span className="inline-flex items-center gap-0.5 ticker font-semibold text-[10px]" style={{color}}>
      {up ? '▲' : down ? '▼' : '—'} {Math.abs(v).toFixed(0)}%
    </span>
  );
}

function ChartView({ data, metric }) {
  const config = {
    dthu:    { label:'Doanh thu', color:'#5b8def', isCurrency:true,  isPct:false },
    don:     { label:'Đơn hàng',  color:'#ed9ebe', isCurrency:false, isPct:false },
    sp:      { label:'Sản phẩm',  color:'#b89cf0', isCurrency:false, isPct:false },
    traffic: { label:'Traffic',   color:'#d4a849', isCurrency:false, isPct:false },
    atv:     { label:'ATV',       color:'#6dc88a', isCurrency:true,  isPct:false },
    upt:     { label:'UPT',       color:'#5b8def', isCurrency:false, isPct:false },
    crv:     { label:'CRV',       color:'#e57878', isCurrency:false, isPct:true  },
  }[metric] || {};
  const keyA = metric + 'A';
  const keyT = metric + 'T';
  const formatVal = (v) => {
    if (v == null) return '';
    if (config.isCurrency) return formatCurrency(v);
    if (config.isPct) return formatNumber(v, 2) + '%';
    if (metric === 'upt') return formatNumber(v, 2);
    return formatNumber(v);
  };
  const gradId = `gMetric_${metric}`;
  return (
    <div style={{width:'100%',height:340}}>
      <ResponsiveContainer>
        <ComposedChart data={data} margin={{top:10,right:30,left:0,bottom:0}}>
          <defs>
            <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={config.color} stopOpacity={0.35}/>
              <stop offset="100%" stopColor={config.color} stopOpacity={0}/>
            </linearGradient>
          </defs>
          <CartesianGrid strokeDasharray="3 6" stroke="rgba(15,23,42,0.05)" vertical={false}/>
          <XAxis dataKey="label" stroke="#94a3b8" fontSize={11} axisLine={false} tickLine={false} dy={8}/>
          <YAxis stroke="#94a3b8" fontSize={11} tickFormatter={formatVal} axisLine={false} tickLine={false} width={70}/>
          <Tooltip
            contentStyle={{borderRadius:14,border:'1px solid rgba(15,23,42,0.06)',fontSize:12,boxShadow:'0 8px 24px rgba(15,23,42,0.08)',background:'rgba(255,255,255,0.95)',backdropFilter:'blur(8px)'}}
            formatter={(v) => formatVal(v)}/>
          <Legend wrapperStyle={{fontSize:12, paddingTop:12}} iconType="circle"/>
          <Area type="monotone" dataKey={keyA} name={`${config.label} thực đạt`} stroke={config.color} strokeWidth={2.5} fill={`url(#${gradId})`} dot={false} activeDot={{r:5, fill:config.color, strokeWidth:0}}/>
          <Line type="monotone" dataKey={keyT} name={`${config.label} mục tiêu`} stroke={config.color} strokeWidth={2} strokeDasharray="6 4" dot={false} legendType="line"/>
        </ComposedChart>
      </ResponsiveContainer>
    </div>
  );
}

function FilterSelect({ label, value, onChange, options }) {
  return (
    <div>
      <label className="block text-[10px] font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">{label}</label>
      <select value={value} onChange={e => onChange(e.target.value)} className="input-soft cursor-pointer">
        {options.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
      </select>
    </div>
  );
}

function DeltaCell({ v }) {
  if (v == null) return <span className="text-slate-300 text-xs">—</span>;
  const up = v > 0, down = v < 0;
  const color = up ? '#6dc88a' : down ? '#e57878' : '#94a3b8';
  return (
    <span className="inline-flex items-center gap-1 ticker font-semibold text-xs" style={{color}}>
      {up?<IconUp size={12} stroke={2.5}/>:down?<IconDown size={12} stroke={2.5}/>:<IconMinus size={12} stroke={2.5}/>}
      {v>0?'+':''}{v.toFixed(1)}%
    </span>
  );
}

function KpiCard({ label, value, target, vsTarget, vsPrev, accent, iconBg, delay=0 }) {
  return (
    <div className="surface p-5 relative overflow-hidden fadeup" style={{animationDelay:`${delay}ms`}}>
      <div className="absolute top-0 right-0 w-24 h-24 rounded-full opacity-40 blur-2xl" style={{background:accent}}/>
      <div className="relative">
        <div className="flex items-center justify-between mb-3">
          <div className="text-[10px] font-semibold text-slate-500 uppercase tracking-wider">{label}</div>
          <div className="w-7 h-7 rounded-xl flex items-center justify-center" style={{background:iconBg}}>
            <div className="w-2 h-2 rounded-full" style={{background:accent, filter:'brightness(0.9)'}}/>
          </div>
        </div>
        <div className="display-font text-2xl font-bold text-slate-900 ticker mb-1">{value}</div>
        <div className="text-[11px] text-slate-400">Mục tiêu <span className="ticker text-slate-500 font-medium">{target}</span></div>
        <div className="grid grid-cols-2 gap-2 mt-4 pt-3 border-t border-slate-100">
          <div>
            <div className="text-[9px] text-slate-400 uppercase tracking-wider font-semibold mb-1">vs MT</div>
            <DeltaCell v={vsTarget}/>
          </div>
          <div>
            <div className="text-[9px] text-slate-400 uppercase tracking-wider font-semibold mb-1">vs CK</div>
            <DeltaCell v={vsPrev}/>
          </div>
        </div>
      </div>
    </div>
  );
}

function RankList({ items, variant='good' }) {
  const max = Math.max(...items.map(i => i.dthuA), 1);
  const grad = variant === 'good' ? 'linear-gradient(90deg, #b9e6c9, #6dc88a)' : 'linear-gradient(90deg, #f5b9b9, #e57878)';
  const badgeBg = variant === 'good' ? '#ecf7f0' : '#fdecec';
  const badgeColor = variant === 'good' ? '#3f9b5d' : '#c44545';
  return (
    <div className="space-y-3">{items.map((it,i) => (
      <div key={it.branch} className="flex items-center gap-3">
        <div className="w-8 h-8 rounded-xl flex items-center justify-center text-xs font-bold shrink-0 display-font" style={{background:badgeBg, color:badgeColor}}>{i+1}</div>
        <div className="flex-1 min-w-0">
          <div className="flex items-center justify-between gap-2 mb-1.5">
            <span className="text-sm font-semibold text-slate-800 truncate">{it.branch}</span>
            <span className="text-sm ticker font-bold text-slate-900">{formatCurrency(it.dthuA)}</span>
          </div>
          <div className="h-1.5 rounded-full bg-slate-100 overflow-hidden">
            <div className="h-full rounded-full transition-all" style={{width:`${(it.dthuA/max)*100}%`,background:grad}}/>
          </div>
          <div className="text-[10px] text-slate-400 mt-1 font-medium">{it.region} • {it.dthuT?`${((it.dthuA/it.dthuT)*100).toFixed(0)}% MT`:'N/A'}</div>
        </div>
      </div>
    ))}</div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
